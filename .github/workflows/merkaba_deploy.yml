name: Archon Prime Radiation
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *' # Refreshes the conceptual field every 24 hours

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install Architecture
        run: pip install -r requirements.txt
      - name: Radiate SEO Frequency
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python archon_prime_logic.py
